<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYMAK PRO - Edit Profile</title>
    <link rel="stylesheet" href="../CSS/editproducerprofile.css">
</head>
<body>
    <div class="layout-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">AYMAK PRO</div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#" class="nav-item" id="navDashboard">
                    Dashboard
                </a>
                <a href="#" class="nav-item" id="navComments">
                    Comments
                    <span class="notification-badge">2</span>
                </a>
                <a href="#" class="nav-item active">
                    <div class="nav-indicator"></div>
                    Edit Profile
                </a>
                <a href="#" class="nav-item" id="navPortfolio">Manage Portfolio</a>
            </nav>

            <div class="sidebar-footer">
                <button class="logout-link" id="logoutBtn">Log Out</button>
            </div>
        </aside>

        <main class="main-content">
            <h1 class="page-title">Edit Profile</h1>

            <div class="form-section">
                <div class="form-group">
                    <label class="input-label">Full Name</label>
                    <input type="text" class="text-input" value="Alex Kebede">
                </div>

                <div class="form-group">
                    <label class="input-label">Bio</label>
                    <textarea class="text-area">Specialized in Wedding and Events...</textarea>
                </div>
            </div>

            <div class="form-section">
                <h3 class="section-subtitle">Services</h3>
                
                <div class="form-group">
                    <label class="input-label">Primary Service</label>
                    <input type="text" class="text-input" value="Video Editor">
                </div>

                <div class="form-group">
                    <label class="input-label">Additional Skills (Comma Separated)</label>
                    <input type="text" class="text-input" value="Colorist, Thumbnail Design, Sound Design">
                </div>
            </div>

            <button class="save-btn" id="saveBtn">SAVE CHANGES</button>
        </main>
    </div>

    <script src="../JS/editproducerprofile.js"></script>
</body>
</html>
