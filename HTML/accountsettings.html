<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYMAK PICTURE - Settings</title>
    <link rel="stylesheet" href="../CSS/accountsettings.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">AYMAK PICTURE</div>
        <a href="#" class="back-link" id="backBtn">Back to Home</a>
    </nav>

    <div class="main-container">
        <h1 class="page-title">My Account Settings</h1>

        <div class="settings-card">
            <div class="photo-section">
                <div class="avatar-circle">M</div>
                <button class="change-photo-btn">Change Photo</button>
            </div>

            <div class="form-group">
                <label class="input-label">Full Name</label>
                <input type="text" class="text-input" value="mamo the best">
            </div>

            <button class="save-btn" id="saveBtn">SAVE CHANGES</button>

            <div class="divider"></div>

            <button class="logout-btn" id="logoutBtn">LOG OUT</button>
        </div>
    </div>

    <script src="../JS/accountsettings.js"></script>
</body>
</html>
